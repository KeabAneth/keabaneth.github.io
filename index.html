    <script>
        let curr = 0;
        document.addEventListener("keydown", e => {
            if(e.key != "d" && e.key != "e" && e.key !="v") {
                curr = 0;
            }
            if(e.key == "d" && curr == 0) {
                curr = 1;
            } else if(e.key == "e" && curr == 1) {
                curr = 2;
            } else if(e.key == "v" && curr == 2) {
                curr = 3;
                eruda.init();
            }
        })
    </script>
